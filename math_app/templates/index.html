<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Máy tính siêu cấp VIP</title>
    <script src="https://unpkg.com/mathlive"></script>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 50px auto; text-align: center; }
        math-field { font-size: 32px; padding: 10px; border: 2px solid #333; border-radius: 8px; width: 100%; margin-bottom: 20px;}
        button { padding: 10px 20px; font-size: 18px; cursor: pointer; background: #28a745; color: white; border: none; border-radius: 5px; }
        #result { margin-top: 20px; font-size: 24px; color: #007bff; font-weight: bold; }
    </style>
</head>
<body>

    <h2>Nhập công thức vào đây nhé bro 🚀</h2>

    <math-field id="mathInput" virtual-keyboard-mode="manual"></math-field>

    <button onclick="solveMath()">Giải Toán!</button>

    <div id="result"></div>

    <script>
        async function solveMath() {
            // Lấy dữ liệu từ ô nhập
            const mf = document.getElementById('mathInput');
            const latex = mf.value;

            // Gửi dữ liệu về Python Backend
            const response = await fetch('/calculate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ equation: latex })
            });

            // Nhận kết quả và in ra màn hình
            const data = await response.json();
            if (data.result) {
                document.getElementById('result').innerText = "Kết quả: " + data.result;
            } else {
                document.getElementById('result').innerText = "Lỗi: " + data.error;
            }
        }
    </script>
</body>
</html>
